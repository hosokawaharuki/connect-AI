<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - conect AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div id="join-modal" style="display: flex;">
        <div class="modal-content">
            <h2>conect AI ログイン</h2>
            <p style="color: #aaa; font-size: 13px; margin-bottom: 15px;">アカウント情報を入力してください</p>
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="flash" style="color: #ff5722; font-size: 13px; margin-bottom: 10px;">{{ messages[0] }}</div>
              {% endif %}
            {% endwith %}
            <form method="POST">
                <input type="text" name="username" placeholder="ユーザー名" required>
                <input type="password" name="password" placeholder="パスワード" required>
                <button type="submit">ログイン</button>
            </form>
            <p style="margin-top: 20px;"><a href="{{ url_for('register') }}" style="color: #4CAF50; text-decoration: none; font-size: 13px;">新規アカウント登録はこちら</a></p>
        </div>
    </div>
</body>
</html>
